<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — First Down Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,800;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080c14;
  --surface:  #0f1520;
  --s1:       #141c2a;
  --s2:       #1a2336;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #e8edf5;
  --muted:    #5a6580;
  --muted2:   #8a96b0;
  --lime:     #a3e635;
  --lime-dim: rgba(163,230,53,0.1);
  --lime-glow:rgba(163,230,53,0.22);
  --red:      #ef4444;
  --green:    #22c55e;
  --blue:     #3b82f6;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Field grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: repeating-linear-gradient(
    90deg, transparent,
    transparent calc(12.5% - 1px),
    rgba(255,255,255,0.012) calc(12.5% - 1px),
    rgba(255,255,255,0.012) 12.5%
  );
  pointer-events: none;
  z-index: 0;
}

/* Glow */
.glow {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(100px);
}
.glow-top {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(163,230,53,0.055) 0%, transparent 70%);
  top: -180px; left: 50%; transform: translateX(-50%);
}
.glow-bot {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(59,130,246,0.04) 0%, transparent 70%);
  bottom: -100px; right: 0;
}

/* Layout */
.page {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
}

/* Logo */
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
  text-decoration: none;
}
.logo-wrap img { height: 44px; width: auto; }
.logo-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1.1;
}
.logo-text span { color: var(--lime); }

/* Card */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.4);
}

.card-top {
  background: linear-gradient(135deg, var(--s1) 0%, var(--s2) 100%);
  padding: 28px 28px 0;
  position: relative;
  overflow: hidden;
}
.card-top::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--lime), transparent);
}

.card-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--lime);
  margin-bottom: 6px;
}

.card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 34px;
  font-weight: 900;
  font-style: italic;
  text-transform: uppercase;
  color: white;
  letter-spacing: -0.01em;
  line-height: 1;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 13px;
  color: var(--muted2);
  padding-bottom: 24px;
  line-height: 1.5;
}

/* Helmet deco */
.card-deco {
  position: absolute;
  right: -20px; top: -20px;
  opacity: 0.06;
}

.card-body { padding: 28px; }

/* Form */
.field { margin-bottom: 16px; }

label {
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 7px;
}

input {
  width: 100%;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
input::placeholder { color: var(--muted); }
input:focus {
  border-color: rgba(163,230,53,0.4);
  box-shadow: 0 0 0 3px rgba(163,230,53,0.07);
}

/* Password wrapper */
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 48px; }
.pw-toggle {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 4px;
  transition: color .2s;
  display: flex; align-items: center;
}
.pw-toggle:hover { color: var(--muted2); }
.pw-toggle svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; }

/* Forgot */
.forgot-row {
  display: flex;
  justify-content: flex-end;
  margin-top: -8px;
  margin-bottom: 16px;
}
.forgot-link {
  font-size: 12px;
  color: var(--muted2);
  text-decoration: none;
  transition: color .2s;
}
.forgot-link:hover { color: var(--lime); }

/* Submit */
.btn-submit {
  width: 100%;
  background: var(--lime);
  color: #080c14;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 10px;
  padding: 15px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s, background .15s;
  margin-top: 4px;
}
.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px var(--lime-glow);
  background: #b6f03f;
}
.btn-submit:active { transform: none; }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px;
  background: var(--border);
}
.divider span {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  white-space: nowrap;
}

/* Bottom links */
.bottom-links {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-outline {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 10px;
  padding: 13px;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  display: block;
  transition: color .2s, border-color .2s, background .2s;
}
.btn-outline:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.2);
  background: var(--s1);
}

/* Auth messages - these get injected by app.js into #formLogin */
.auth-msg {
  border-radius: 10px !important;
  padding: 12px 16px !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  margin-top: 14px !important;
  display: flex !important;
  align-items: center !important;
  gap: 8px !important;
}

/* Override app.js light styles with dark versions */
#formLogin .auth-msg[style*="FEF2F2"],
#formSignup .auth-msg[style*="FEF2F2"] {
  background: rgba(239,68,68,0.1) !important;
  border-color: rgba(239,68,68,0.25) !important;
  color: #f87171 !important;
}
#formLogin .auth-msg[style*="F0FDF4"],
#formSignup .auth-msg[style*="F0FDF4"] {
  background: rgba(34,197,94,0.1) !important;
  border-color: rgba(34,197,94,0.2) !important;
  color: #4ade80 !important;
}
#formLogin .auth-msg[style*="EFF6FF"],
#formSignup .auth-msg[style*="EFF6FF"] {
  background: rgba(163,230,53,0.08) !important;
  border-color: rgba(163,230,53,0.15) !important;
  color: var(--lime) !important;
}

/* Footer */
.page-footer {
  position: relative; z-index: 1;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: var(--muted);
}
.page-footer a { color: var(--muted2); text-decoration: none; }
.page-footer a:hover { color: var(--lime); }
</style>
</head>
<body>

<div class="glow glow-top"></div>
<div class="glow glow-bot"></div>

<div class="page">

  <a class="logo-wrap" href="index.html">
    <img src="logo.png" alt="First Down Academy" onerror="this.style.display='none'">
    <div class="logo-text">First Down <span>Academy</span></div>
  </a>

  <div class="card">
    <div class="card-top">
      <!-- Helmet deco -->
      <svg class="card-deco" width="120" height="110" viewBox="0 0 220 200" fill="none">
        <ellipse cx="105" cy="95" rx="85" ry="80" fill="white"/>
        <path d="M30 110 Q20 70 50 45 Q80 18 115 18 Q160 18 185 55 Q205 85 200 120 L185 125 Q180 90 160 68 Q138 44 110 44 Q78 44 58 65 Q40 84 40 115 Z" fill="white"/>
      </svg>
      <div class="card-eyebrow">Welcome Back</div>
      <div class="card-title">Log In</div>
      <div class="card-sub">Pick up where you left off</div>
    </div>

    <div class="card-body">
      <!-- app.js looks for #formLogin to append messages -->
      <div id="formLogin">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password">
            <button class="pw-toggle" type="button" onclick="togglePw('loginPassword', this)" tabindex="-1">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="forgot-row">
          <a class="forgot-link" href="reset.html">Forgot password?</a>
        </div>

        <button class="btn-submit" id="loginBtn" onclick="loginBtn()">Log In →</button>

        <div class="divider"><span>New to FDA?</span></div>

        <div class="bottom-links">
          <a class="btn-outline" href="signup.html">Create Player Account →</a>
          <a class="btn-outline" href="coach-signup.html">Join as a Coach →</a>
        </div>
      </div>
    </div>
  </div>

</div>

<footer class="page-footer">
  <a href="legal.html">Privacy</a> &middot; <a href="legal.html">Terms</a> &middot; <a href="index.html">firstdownacademy.com</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="curriculum.js?v=2"></script>
<script src="app.js?v=2"></script>
<script>
function showPage(name) {
  var map = {
    'home':'index.html','course':'program.html','giq':'giq.html',
    'signup':'signup.html','dashboard':'dashboard.html','lesson':'lesson.html',
    'legal':'legal.html','coaches':'coaches.html'
  };
  if (map[name]) window.location.href = map[name];
}
function buildModuleList() {}
function buildDashModuleList() {}
function updateNavForLoggedIn() {}

function togglePw(id, btn) {
  var inp = document.getElementById(id);
  var isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.querySelector('svg').innerHTML = isText
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

// Wrapper so Enter key works
function loginBtn() {
  doLogin();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loginBtn();
});

// If already logged in, skip to dashboard
document.addEventListener('sessionReady', function() {
  if (currentUser) window.location.href = 'dashboard.html';
});

// Check URL for tab param (legacy support)
var params = new URLSearchParams(window.location.search);
if (params.get('tab') === 'signup') {
  window.location.href = 'signup.html';
}
</script>
</body>
</html>
